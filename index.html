<body>

<script>
(function(){

var frame=document.getElementById('app'),doc=null,win=null,meta={},orig={},started=false;
function key(){return 'nationalDexSortMeta.v0.3'}
function filterKey(){return 'nationalDexFilterMode.v0.4'}
function read(){try{return JSON.parse(localStorage.getItem(key()))||{}}catch(e){return {}}}
function write(){try{localStorage.setItem(key(),JSON.stringify(meta))}catch(e){}}
function id(x){return doc.getElementById(x)}
function all(s,root){return Array.prototype.slice.call((root||doc).querySelectorAll(s))}
function rows(){return all('.row').filter(function(r){return r.querySelector('input[type="checkbox"][data-num]')})}

function filterStatus(t){var f=id('filterStatus');if(f)f.textContent=t;var s=id('statusLine');if(s)s.textContent=t}
function pretty(t){return String(t||'').split('-').map(function(p){return p.charAt(0).toUpperCase()+p.slice(1)}).join(' ')}
function category(m){if(!m)return '';if(m.is_mythical)return 'mythical';if(m.is_legendary)return 'legendary';if(m.capture_rate!=null&&m.capture_rate<=45)return 'uncommon';return 'common'}

function scoped(){var rg=region();return rows().filter(function(r){return rg==='All'||r.dataset.region===rg})}

function setHeaderCollapsed(on){doc.body.classList.toggle('header-collapsed',!!on);var b=id('headerCollapseBtn');if(b){b.textContent=on?'Show Menu ▼':'Collapse Menu ▲';b.setAttribute('aria-expanded',String(!on))}try{localStorage.setItem('nationalDexHeaderCollapsed.v0.3',on?'1':'0')}catch(e){}}
function setupCollapse(){var h=doc.querySelector('header .wrap')||doc.querySelector('header');if(!h||id('headerCollapseBtn'))return;h.insertAdjacentHTML('afterbegin','<div class="header-collapse-row"><span class="build-badge">'+BUILD_LABEL+'</span><button id="headerCollapseBtn" type="button" aria-expanded="true">Collapse Menu ▲</button></div>');id('headerCollapseBtn').addEventListener('click',function(){setHeaderCollapsed(!doc.body.classList.contains('header-collapsed'))});try{setHeaderCollapsed(localStorage.getItem('nationalDexHeaderCollapsed.v0.3')==='1')}catch(e){setHeaderCollapsed(false)}}
function inject(){
 var style=doc.createElement('style');
 style.textContent='.header-collapse-row{display:flex;align-items:center;justify-content:space-between;gap:8px;margin:0 0 7px}.build-badge{display:inline-flex;align-items:center;justify-content:center;border:1px solid rgba(255,255,255,.24);border-radius:999px;background:rgba(15,23,42,.32);color:#fff;font-size:.68rem;font-weight:950;letter-spacing:.035em;padding:5px 8px;line-height:1;white-space:nowrap}#headerCollapseBtn{border:0;border-radius:999px;background:rgba(255,255,255,.92);color:#172554;font:inherit;font-size:.82rem;font-weight:950;padding:8px 11px;min-height:36px;box-shadow:0 6px 15px rgba(0,0,0,.16)}body.header-collapsed header{padding-bottom:8px!important}body.header-collapsed header .sub,body.header-collapsed header .dev-note,body.header-collapsed header .meter,body.header-collapsed header .tools,body.header-collapsed header .sort-tools,body.header-collapsed header .sort-status,body.header-collapsed header .filter-tools,body.header-collapsed header .filter-status,body.header-collapsed header .tabs{display:none!important}body.header-collapsed header h1{font-size:1.05rem!important;line-height:1.1!important;margin:0!important}.sort-tools,.filter-tools{display:grid;grid-template-columns:auto minmax(190px,1fr) auto auto;gap:8px;align-items:center;margin:0 0 8px}.filter-tools{grid-template-columns:auto minmax(220px,1fr) auto}.sort-label,.filter-label{font-weight:950;color:white;font-size:.88rem;white-space:nowrap}#sortMode,#filterMode{border:0;border-radius:999px;padding:11px 14px;font-size:16px;outline:none;background:white;color:#111827;font-weight:800;min-height:42px;width:100%}#sortDataBtn,#resetSortBtn,#clearFilterBtn{display:grid;place-items:center;border:0;border-radius:999px;background:#e5e7eb;color:#111827;font-weight:900;padding:10px 13px;min-height:42px;cursor:pointer;text-align:center;text-decoration:none}#sortDataBtn{background:#a7f3d0;color:#064e3b}#clearFilterBtn{background:#bfdbfe;color:#172554}#sortDataBtn[disabled],#resetSortBtn[disabled],#clearFilterBtn[disabled]{opacity:.62;cursor:not-allowed}.sort-status,.filter-status{font-size:.78rem;font-weight:850;color:#fff3a4;min-height:16px;margin:-2px 0 8px}#sortedSection{display:none}body.sorted-mode main .region-section:not(#sortedSection){display:none!important}body.sorted-mode #sortedSection{display:block!important}.row.filter-hidden,.region-section.filter-hidden{display:none!important}.sort-chip,.filter-chip{flex:0 0 auto;border-radius:999px;background:#eef2ff;color:#3730a3;font-weight:950;font-size:.72rem;padding:5px 8px;white-space:nowrap}.sort-chip.pending,.filter-chip.pending{background:#fef3c7;color:#92400e}.sort-chip.mythical,.filter-chip.mythical{background:#ede9fe;color:#5b21b6}.sort-chip.legendary,.filter-chip.legendary{background:#dbeafe;color:#1d4ed8}.sort-chip.uncommon,.filter-chip.uncommon{background:#fef3c7;color:#92400e}.sort-chip.common,.filter-chip.common{background:#dcfce7;color:#166534}.sort-chip.community,.filter-chip.community{background:#ffe4e6;color:#9f1239}.sort-chip.color,.filter-chip.color{background:#f3f4f6;color:#374151}.sort-chip.type,.filter-chip.type{background:#e0f2fe;color:#075985}.sort-chip.caught,.filter-chip.caught{background:#dcfce7;color:#166534}.sort-chip.missing,.filter-chip.missing{background:#fee2e2;color:#991b1b}@media(max-width:700px){.sort-tools,.filter-tools{grid-template-columns:1fr}.sort-label,.filter-label{display:none}#sortDataBtn,#resetSortBtn,#clearFilterBtn{width:100%}.header-collapse-row{margin-bottom:5px}#headerCollapseBtn{font-size:.78rem;padding:7px 10px}.build-badge{font-size:.64rem;padding:5px 7px}}';
 doc.head.appendChild(style);
 setupCollapse();
 var tools=doc.querySelector('.tools');
 if(tools&&!id('sortMode'))tools.insertAdjacentHTML('afterend','<div class="sort-tools" aria-label="Sort controls"><span class="sort-label">Sort</span><select id="sortMode"><option value="dex">Pokédex Entry #</option><option value="type">Primary Type</option><option value="status">Common / Uncommon / Legendary / Mythical</option><option value="color">Primary Color</option><option value="community">Community Picks beta</option></select><button id="sortDataBtn" type="button">Load Sort Data</button><button id="resetSortBtn" type="button">Reset Order</button></div><div class="sort-status" id="sortStatus">Sort build restored. Header can now collapse.</div><div class="filter-tools" aria-label="Filter controls"><span class="filter-label">Filter</span><select id="filterMode"><option value="all">Show All Pokémon</option><option value="caught">Caught / Checked Only</option><option value="missing">Missing / Unchecked Only</option><option value="community">Community Picks Only</option><option value="status:common">Common Only</option><option value="status:uncommon">Uncommon Only</option><option value="status:legendary">Legendary Only</option><option value="status:mythical">Mythical Only</option><option disabled>──────── Types ────────</option><option value="type:normal">Normal Type</option><option value="type:fire">Fire Type</option><option value="type:water">Water Type</option><option value="type:electric">Electric Type</option><option value="type:grass">Grass Type</option><option value="type:ice">Ice Type</option><option value="type:fighting">Fighting Type</option><option value="type:poison">Poison Type</option><option value="type:ground">Ground Type</option><option value="type:flying">Flying Type</option><option value="type:psychic">Psychic Type</option><option value="type:bug">Bug Type</option><option value="type:rock">Rock Type</option><option value="type:ghost">Ghost Type</option><option value="type:dragon">Dragon Type</option><option value="type:dark">Dark Type</option><option value="type:steel">Steel Type</option><option value="type:fairy">Fairy Type</option><option disabled>──────── Colors ────────</option><option value="color:black">Black Color</option><option value="color:blue">Blue Color</option><option value="color:brown">Brown Color</option><option value="color:gray">Gray Color</option><option value="color:green">Green Color</option><option value="color:pink">Pink Color</option><option value="color:purple">Purple Color</option><option value="color:red">Red Color</option><option value="color:white">White Color</option><option value="color:yellow">Yellow Color</option></select><button id="clearFilterBtn" type="button">Clear Filter</button></div><div class="filter-status" id="filterStatus">Filters ready. Caught/missing work instantly; type/color/rarity use loaded sort data.</div>');
 var form=id('dexForm');
 if(form&&!id('sortedSection'))form.insertAdjacentHTML('afterbegin','<section id="sortedSection" class="region-section" data-region="Sorted"><h2 id="sortedTitle">Sorted View <span>Sorting active</span></h2><div class="list" id="sortedList"></div></section>');
 rows().forEach(function(r){orig[num(r)]={p:r.parentNode}});
 var savedFilter='all';try{savedFilter=localStorage.getItem(filterKey())||'all'}catch(e){}
 if(id('filterMode'))id('filterMode').value=savedFilter;
 id('sortMode').addEventListener('change',sort);
 id('sortDataBtn').addEventListener('click',load);
 id('resetSortBtn').addEventListener('click',reset);
 id('filterMode').addEventListener('change',function(){try{localStorage.setItem(filterKey(),getFilter())}catch(e){} refreshView('Filter changed.');});
 id('clearFilterBtn').addEventListener('click',function(){id('filterMode').value='all';try{localStorage.setItem(filterKey(),'all')}catch(e){} refreshView('Filter cleared.');});
 var search=id('search');if(search)search.addEventListener('input',function(){setTimeout(applyFilters,0)});
 all('input[name="region"]').forEach(function(r){r.addEventListener('change',function(){setTimeout(function(){refreshView('Region changed.')},0)})});
 st('V0.4 filter branch ready. Use filters with region tabs and sorting.');
 refreshView('Filters initialized.');
}
function restore(){rows().sort(function(a,b){return parseInt(num(a),10)-parseInt(num(b),10)}).forEach(function(r){var o=orig[num(r)];if(o&&o.p)o.p.appendChild(r)});if(id('sortedList'))id('sortedList').innerHTML='';doc.body.classList.remove('sorted-mode');all('.sort-chip').forEach(function(c){c.remove()});all('.filter-chip').forEach(function(c){c.remove()})}
function chip(r,t,c,kind){all('.'+(kind||'sort')+'-chip',r).forEach(function(x){x.remove()});var s=doc.createElement('span');s.className=(kind||'sort')+'-chip '+(c||'');s.textContent=t;r.appendChild(s)}
function filterText(){var f=getFilter();if(f==='all')return 'All Pokémon';if(f==='caught')return 'Caught only';if(f==='missing')return 'Missing only';if(f==='community')return 'Community picks only';var p=f.split(':');if(p[0]==='type')return LABELS[p[1]]+' type';if(p[0]==='color')return pretty(p[1])+' color';if(p[0]==='status')return catLabel(p[1])+' only';return 'Filtered'}
function metadataNeeded(){var f=getFilter();return f.indexOf('type:')===0||f.indexOf('color:')===0||f.indexOf('status:')===0}
function filterPass(r){var f=getFilter(),n=num(r),m=meta[n],b=box(r);if(f==='all')return true;if(f==='caught')return !!(b&&b.checked);if(f==='missing')return !!(b&&!b.checked);if(f==='community')return !!PICKS[n];var p=f.split(':');if(p[0]==='type')return !!(m&&m.primary_type===p[1]);if(p[0]==='color')return !!(m&&m.color===p[1]);if(p[0]==='status')return !!(m&&category(m)===p[1]);return true}
function applyFilterChip(r){var f=getFilter(),n=num(r),m=meta[n],b=box(r);if(f==='all')return;if(f==='caught')chip(r,'Caught','caught','filter');else if(f==='missing')chip(r,'Missing','missing','filter');else if(f==='community')chip(r,'Pick '+(PICKS[n]||''),'community','filter');else {var p=f.split(':');if(p[0]==='type')chip(r,m&&m.primary_type?LABELS[m.primary_type]:'Load type',m&&m.primary_type?'type':'pending','filter');if(p[0]==='color')chip(r,m&&m.color?pretty(m.color):'Load color',m&&m.color?'color':'pending','filter');if(p[0]==='status'){var c=category(m);chip(r,c?catLabel(c):'Load status',c||'pending','filter')}}}
function applyFilters(){var f=getFilter(),allRows=rows(),visible=0,scopedCount=0;allRows.forEach(function(r){all('.filter-chip',r).forEach(function(x){x.remove()});var inRegion=(region()==='All'||r.dataset.region===region());var pass=filterPass(r);if(inRegion)scopedCount++;r.classList.toggle('filter-hidden',!pass);if(inRegion&&pass){visible++;applyFilterChip(r)}});sections().forEach(function(sec){var any=all('.row',sec).some(function(r){return !r.classList.contains('filter-hidden')&&!r.classList.contains('search-hidden')});sec.classList.toggle('filter-hidden',!any)});var msg=filterText()+': '+visible+' of '+scopedCount+' in '+(region()==='All'?'All Regions':region());if(metadataNeeded()&&scoped().some(function(r){return !meta[num(r)]}))msg+=' — tap Load Sort Data for complete results.';filterStatus(msg)}
function val(r,m){var n=num(r),x=meta[n]||{};if(m==='type'){var i=TYPES.indexOf(x.primary_type||'');if(i<0)i=999;return[i,x.primary_type||'zzzz',parseInt(n,10)]}if(m==='status'){var c=category(x)||'zzzz';var si=STATS.indexOf(c);if(si<0)si=999;return[si,parseInt(n,10)]}if(m==='color'){var ci=COLORS.indexOf(x.color||'');if(ci<0)ci=999;return[ci,x.color||'zzzz',parseInt(n,10)]}if(m==='community')return[-(PICKS[n]||0),parseInt(n,10)];return[parseInt(n,10)]}
function cmp(m){return function(a,b){var A=val(a,m),B=val(b,m);for(var i=0;i<Math.max(A.length,B.length);i++){if(A[i]<B[i])return-1;if(A[i]>B[i])return 1}return 0}}
function decorate(r,m){var n=num(r),x=meta[n];if(m==='type')chip(r,x&&x.primary_type?LABELS[x.primary_type]:'Load type',x&&x.primary_type?'type':'pending','sort');else if(m==='status'){var c=category(x);chip(r,c?catLabel(c):'Load status',c||'pending','sort')}else if(m==='color')chip(r,x&&x.color?pretty(x.color):'Load color',x&&x.color?'color':'pending','sort');else if(m==='community'){var sc=PICKS[n]||0;chip(r,sc?'Pick '+sc:'Unscored',sc?'community':'pending','sort')}}
function sort(){restore();var m=id('sortMode').value;if(m==='dex'){applyFilters();if(win.Dex&&win.Dex.search)win.Dex.search();setTimeout(applyFilters,0);return}var list=id('sortedList'),rs=scoped().filter(filterPass).sort(cmp(m));rs.forEach(function(r){decorate(r,m);applyFilterChip(r);list.appendChild(r)});doc.body.classList.add('sorted-mode');id('sortedTitle').innerHTML='Sorted View <span>'+(region()==='All'?'All Regions':region())+' · '+id('sortMode').options[id('sortMode').selectedIndex].text+' · '+filterText()+' · '+rs.length+' Pokémon</span>';var needs=(m==='type'||m==='color'||m==='status'||metadataNeeded())&&scoped().some(function(r){return !meta[num(r)]});st(needs?'Filtered/sorted with fallback data. Tap Load Sort Data for complete type/color/status metadata.':m==='community'?'Community Picks beta with active filter.':'Filtered and sorted.');if(win.Dex&&win.Dex.search)win.Dex.search();setTimeout(applyFilters,0)}
function refreshView(msg){if(id('sortMode')&&id('sortMode').value!=='dex')sort();else{restore();applyFilters();if(win.Dex&&win.Dex.search)win.Dex.search();setTimeout(applyFilters,0)}if(msg)filterStatus(msg+' '+filterText()+'.')}
function load(){if(started)return;var ids=scoped().map(num).filter(function(n){return !meta[n]});if(!ids.length){st('Sort/filter metadata already loaded for this view.');sort();return}started=true;var btn=id('sortDataBtn');btn.disabled=true;btn.textContent='Loading…';var done=0,idx=0,workers=[];st('Loading sort/filter metadata 0 / '+ids.length+'…');function fj(u){return fetch(u).then(function(r){if(!r.ok)throw Error('HTTP '+r.status);return r.json()})}function work(){if(idx>=ids.length)return Promise.resolve();var n=ids[idx++],i=parseInt(n,10);return Promise.all([fj('https://pokeapi.co/api/v2/pokemon/'+i+'/'),fj('https://pokeapi.co/api/v2/pokemon-species/'+i+'/')]).then(function(a){var p=a[0],s=a[1];meta[n]={primary_type:p.types&&p.types[0]&&p.types[0].type?p.types[0].type.name:'',color:s.color&&s.color.name?s.color.name:'',is_legendary:!!s.is_legendary,is_mythical:!!s.is_mythical,capture_rate:s.capture_rate}}).catch(function(){meta[n]=meta[n]||{}}).then(function(){done++;if(done%10===0||done===ids.length){write();st('Loading sort/filter metadata '+done+' / '+ids.length+'…')}return work()})}for(var w=0;w<Math.min(8,ids.length);w++)workers.push(work());Promise.all(workers).then(function(){write();started=false;btn.disabled=false;btn.textContent='Load Sort Data';st('Sort/filter metadata loaded and cached.');sort()}).catch(function(){started=false;btn.disabled=false;btn.textContent='Retry Sort Data';st('Sort/filter metadata load hit an error. Try again while online.')})}
function reset(){id('sortMode').value='dex';restore();applyFilters();st('Sorted by Pokédex entry number. Filter remains: '+filterText()+'.');if(win.Dex&&win.Dex.search)win.Dex.search();setTimeout(applyFilters,0)}
frame.addEventListener('load',function(){win=frame.contentWindow;doc=frame.contentDocument;meta=read();try{inject()}catch(e){document.getElementById('load').innerHTML='<div><div class="ball"></div><h1>V0.4 injection failed</h1><p>'+String(e.message||e)+'</p></div>';return}setTimeout(function(){var l=document.getElementById('load');if(l)l.style.display='none'},350)});
fetch(BASE+'?v='+Date.now(),{cache:'no-store'}).then(function(r){if(!r.ok)throw Error('Base app load failed');return r.text()}).then(function(html){frame.srcdoc=html}).catch(function(err){document.getElementById('load').innerHTML='<div><div class="ball"></div><h1>Could not load Pokédex base</h1><p>'+err.message+'</p></div>'});
})();
</script>
