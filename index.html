<html lang="en">
<head>
<meta charset="utf-8">

<meta name="theme-color" content="#d62828">
<title>Kanto 151 Scrolling Checklist</title>
<style>
:root {
  --bg:#f7f7fb;
  --ink:#1f2937;
  --muted:#6b7280;
  --red:#d62828;
  --red-dark:#941b1b;
  --yellow:#ffcb05;
  --blue:#2a75bb;
  --card:#ffffff;
  --line:#e5e7eb;
  --checked:#16a34a;
}
* { box-sizing:border-box; }
html, body {
  margin:0;
  min-height:100%;
  font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  background:var(--bg);
  color:var(--ink);
}
body { padding:0 0 env(safe-area-inset-bottom); }
header {
  position:sticky;
  top:0;
  z-index:10;
  background:linear-gradient(135deg,var(--red),var(--red-dark));
  color:white;
  padding:max(18px,env(safe-area-inset-top)) 16px 14px;
  box-shadow:0 4px 18px rgba(0,0,0,.18);
}
.header-top, .tools {
  max-width:760px;
  margin:0 auto;
}
h1 {
  margin:0;
  font-size:1.45rem;
  line-height:1.1;
  letter-spacing:-.03em;
}
.sub {
  margin:5px 0 12px;
  color:rgba(255,255,255,.88);
  font-size:.92rem;
}
.meter-row {
  display:flex;
  align-items:center;
  gap:10px;
}
.progress {
  flex:1;
  height:13px;
  background:rgba(0,0,0,.25);
  border-radius:999px;
  overflow:hidden;
  border:1px solid rgba(255,255,255,.22);
}
.bar {
  height:100%;
  width:0%;
  background:linear-gradient(90deg,var(--yellow),#fff3a4);
  transition:width .2s ease;
}
.count {
  min-width:86px;
  text-align:right;
  font-weight:800;
  font-size:.95rem;
}
.tools {
  margin-top:10px;
  display:grid;
  grid-template-columns:1fr auto;
  gap:8px;
}
input[type="search"] {
  width:100%;
  border:0;
  border-radius:999px;
  padding:11px 14px;
  font-size:16px;
  outline:none;
}
button {
  border:0;
  border-radius:999px;
  background:var(--yellow);
  color:#172554;
  font-weight:900;
  padding:10px 13px;
  min-height:42px;
}
main {
  max-width:760px;
  margin:0 auto;
  padding:10px 10px 30px;
}
.list {
  background:var(--card);
  border:1px solid var(--line);
  border-radius:18px;
  overflow:hidden;
  box-shadow:0 8px 30px rgba(15,23,42,.08);
}
.row {
  display:flex;
  align-items:center;
  gap:12px;
  min-height:48px;
  padding:9px 13px;
  border-bottom:1px solid var(--line);
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
}
.row:last-child { border-bottom:0; }
.row:nth-child(even) { background:#fafafa; }
.row.checked { background:#f0fdf4; }
.dexnum {
  width:50px;
  color:var(--blue);
  font-family:ui-monospace,SFMono-Regular,Menlo,monospace;
  font-weight:900;
  font-size:.92rem;
}
.name {
  flex:1;
  font-weight:750;
  font-size:1rem;
}
.row.checked .name {
  color:var(--muted);
  text-decoration:line-through;
}
input[type="checkbox"] {
  width:25px;
  height:25px;
  accent-color:var(--checked);
  flex:0 0 auto;
}
.empty {
  display:none;
  text-align:center;
  padding:24px;
  color:var(--muted);
}
.footer-note {
  text-align:center;
  color:var(--muted);
  font-size:.82rem;
  margin:14px 0 0;
}
@media (max-width:520px) {
  main { padding-left:8px; padding-right:8px; }
  .tools { grid-template-columns:1fr; }
  button { width:100%; }
  .row { min-height:50px; padding:10px 12px; }
  .dexnum { width:47px; }
}
@media print {
  header { position:static; background:white; color:black; box-shadow:none; border-bottom:2px solid black; }
  .sub,.tools,.progress,.footer-note { display:none; }
  main { max-width:none; padding:0; }
  .list { box-shadow:none; border:0; border-radius:0; columns:3; }
  .row { break-inside:avoid; min-height:28px; padding:3px 6px; border:1px solid #aaa; }
  input[type="checkbox"] { width:16px; height:16px; }
}
</style>

  <div class="tools">

    <button id="reset" type="button">Reset</button>
  </div>
</header>

<script>
(function () {
  var KEY = "kanto151.staticScrollingChecklist.v1";
  var rows = Array.prototype.slice.call(document.querySelectorAll(".row"));
  var boxes = Array.prototype.slice.call(document.querySelectorAll('input[type="checkbox"][data-num]'));
  var count = document.getElementById("count");
  var bar = document.getElementById("bar");
  var search = document.getElementById("search");
  var empty = document.getElementById("empty");
  var reset = document.getElementById("reset");

  function readSaved() {
    try { return JSON.parse(localStorage.getItem(KEY)) || []; }
    catch (e) { return []; }
  }

  function writeSaved(nums) {
    try { localStorage.setItem(KEY, JSON.stringify(nums)); }
    catch (e) {}
  }

  function currentCheckedNums() {
    return boxes.filter(function (box) { return box.checked; }).map(function (box) { return box.dataset.num; }).sort();
  }

  function updateProgress() {
    var done = currentCheckedNums().length;
    var total = boxes.length;
    var pct = total ? Math.round((done / total) * 100) : 0;
    count.textContent = done + " / " + total;
    bar.style.width = pct + "%";
    document.title = done + "/" + total + " Kanto Checklist";
  }

  function syncRow(box) {
    var row = box.closest(".row");
    if (row) row.classList.toggle("checked", box.checked);
  }

  function saveAndUpdate() {
    writeSaved(currentCheckedNums());
    boxes.forEach(syncRow);
    updateProgress();
  }

  function normalize(text) {
    return String(text).toLowerCase().replace(/[.#\s]/g, "");
  }

  function filterRows() {
    var q = normalize(search.value);
    var visibleCount = 0;
    rows.forEach(function (row) {
      var haystack = normalize(row.dataset.search || row.textContent);
      var show = !q || haystack.indexOf(q) !== -1;
      row.style.display = show ? "flex" : "none";
      if (show) visibleCount++;
    });
    empty.style.display = visibleCount ? "none" : "block";
  }

  var saved = readSaved();
  boxes.forEach(function (box) {
    box.checked = saved.indexOf(box.dataset.num) !== -1;
    syncRow(box);
    box.addEventListener("change", saveAndUpdate);
  });

  search.addEventListener("input", filterRows);

  reset.addEventListener("click", function () {
    if (!confirm("Clear all checklist progress on this device?")) return;
    boxes.forEach(function (box) { box.checked = false; });
    saveAndUpdate();
  });

  updateProgress();
  filterRows();
}());
</script>
</body>
</html>
