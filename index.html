frame.addEventListener("load",function(){win=frame.contentWindow;doc=frame.contentDocument;meta=R(K());dex=R(DK());try{inject()}catch(e){document.getElementById("load").innerHTML='<div><div class="ball"></div><h1>V0.4.2 injection failed</h1><p>'+String(e.message||e)+'</p></div>';return}setTimeout(function(){var l=document.getElementById("load");if(l)l.style.display="none"},350)});
fetch(BASE+"?v="+Date.now(),{cache:"no-store"}).then(function(r){if(!r.ok)throw Error("Base app load failed");return r.text()}).then(function(h){frame.srcdoc=h}).catch(function(e){document.getElementById("load").innerHTML='<div><div class="ball"></div><h1>Could not load Pokédex base</h1><p>'+String(e.message||e)+'</p></div>'});
})();
</script>
