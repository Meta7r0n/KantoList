argin:-2px 0 8px}.badge-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px}.ach-badge{position:relative;border:1px solid rgba(255,255,255,.13);border-radius:16px;background:rgba(255,255,255,.07);padding:9px;min-height:86px;overflow:hidden}.ach-badge.earned{background:linear-gradient(135deg,rgba(255,203,5,.28),rgba(34,197,94,.18));border-color:rgba(255,203,5,.7)}.ach-badge.locked{opacity:.68}.ach-icon{width:33px;height:33px;border-radius:999px;display:grid;place-items:center;background:rgba(255,255,255,.12);font-size:1rem;font-weight:1000;margin-bottom:5px}.ach-badge.earned .ach-icon{background:#ffcb05;color:#172554;box-shadow:0 0 0 2px rgba(255,255,255,.12)}.ach-title{font-size:.78rem;font-weight:1000;color:#fff;line-height:1.15}.ach-desc{font-size:.68rem;font-weight:750;color:#cbd5e1;line-height:1.2;margin-top:3px}.ach-progress{font-size:.68rem;font-weight:950;color:#fff3a4;margin-top:5px}.ach-share{position:absolute;right:7px;top:7px;border:0;border-radius:999px;background:#e5e7eb;color:#172554;font-size:.65rem;font-weight:950;padding:5px 7px;display:none;cursor:pointer}.ach-badge.earned .ach-share{display:block}body.header-collapsed header .sub,body.header-collapsed header .dev-note,body.header-collapsed header .meter,body.header-collapsed header .tools,body.header-collapsed header .tabs,body.header-collapsed header .sort-tools,body.header-collapsed header .sort-status,body.header-collapsed header .filter-tools,body.header-collapsed header .backup-tools,body.header-collapsed header .filter-status,body.header-collapsed header .stats-panel,body.header-collapsed header .achievements-panel{display:none!important}body.header-collapsed header{padding-bottom:8px!important}body.stats-mini .stats-grid,body.stats-mini #regionStats,body.stats-mini #typeStats,body.stats-mini .stat-section-title,body.stats-mini #statsNote,body.stats-mini .achievements-panel{display:none!important}body.badges-mini .badge-grid,body.badges-mini .achievement-note{display:none!important}body.stats-mini .stats-panel,body.badges-mini .achievements-panel{padding:9px 10px}.quick-scroll-btn{position:fixed;right:12px;bottom:calc(16px + env(safe-area-inset-bottom));z-index:45;border:0;border-radius:999px;background:#ffcb05;color:#172554;font-weight:950;padding:10px 12px;box-shadow:0 10px 30px rgba(0,0,0,.25);display:none;cursor:pointer}body.show-top-btn .quick-scroll-btn{display:block}@media(max-width:700px){.stats-grid,.badge-grid{grid-template-columns:repeat(2,1fr)}.stat-row{grid-template-columns:70px 1fr 48px}.stats-panel,.achievements-panel{padding:9px}.stats-head,.achievement-head{align-items:flex-start}.stats-head-actions,.achievement-actions{flex-direction:column;align-items:flex-end}.v050-menu-toggle{font-size:.72rem;padding:7px 9px}.ach-badge{min-height:82px}}';

function ensureHeaderCollapse(){
  var hd=doc.querySelector('header .wrap')||doc.querySelector('header');
  if(!hd) return;
  var row=doc.querySelector('.header-collapse-row');

}
function ensureQuickTop(){
  if(!$('quickTopBtn')) doc.body.insertAdjacentHTML('beforeend','<button type="button" class="quick-scroll-btn" id="quickTopBtn">Top</button>');
  var btn=$('quickTopBtn');

}
function statPct(done,total){return total?Math.round(done/total*100):0;}
function statChecked(list){return list.filter(function(r){var b=box(r);return b&&b.checked}).length;}
function statCard(label,value,sub,pct){return '<div class="stat-card"><div class="stat-label">'+esc(label)+'</div><div class="stat-value">'+esc(value)+'</div><div class="stat-sub">'+esc(sub||'')+'</div><div class="stat-bar"><div class="stat-fill" style="width:'+Math.max(0,Math.min(100,pct||0))+'%"></div></div></div>';}
function statBarRow(label,done,total){var p=statPct(done,total);return '<div class="stat-row"><span>'+esc(label)+'</span><div class="stat-bar"><div class="stat-fill" style="width:'+p+'%"></div></div><span>'+done+'/'+total+'</span></div>';}
function statRarity(kind,list){var total=0,done=0,unknown=0;list.forEach(function(r){var n=nOf(r),m=meta[n],c=cat(m),b=box(r);if(!m||!c){unknown++;return}if(c===kind){total++;if(b&&b.checked)done++}});return {done:done,total:total,unknown:unknown};}
function regionMap(){var map={};rows().forEach(function(r){var key=r.dataset.region||'Unknown';if(!map[key])map[key]={done:0,total:0};map[key].total++;var b=box(r);if(b&&b.checked)map[key].done++;});return map;}
function renderRegionStats(){var map=regionMap();var order=['Kanto','Johto','Hoenn','Sinnoh','Unova','Kalos','Alola','Galar','Hisui','Paldea'];var html=order.filter(function(k){return map[k]}).map(function(k){return statBarRow(k,map[k].done,map[k].total)}).join('');var el=$('regionStats');if(el)el.innerHTML=html||'<p class="stat-note">No region data found.</p>';}
function renderTypeStats(){var counts={};TYPES.forEach(function(t){counts[t]={done:0,total:0}});var known=0;rows().forEach(function(r){var n=nOf(r),m=meta[n],b=box(r);if(m&&m.primary_type&&counts[m.primary_type]){known++;counts[m.primary_type].total++;if(b&&b.checked)counts[m.primary_type].done++;}});var html=TYPES.filter(function(t){return counts[t].total>0}).sort(function(a,b){return counts[b].total-counts[a].total}).slice(0,8).map(function(t){return statBarRow(TL[t]||pty(t),counts[t].done,counts[t].total)}).join('');var el=$('typeStats');if(el)el.innerHTML=html||'<p class="stat-note">Tap Load All App Data to build the type snapshot.</p>';return known;}
function renderStats(){
  var all=rows(), current=scoped(), caughtAll=statChecked(all), caughtCurrent=statChecked(current), totalAll=all.length, totalCurrent=current.length;
  var missingAll=totalAll-caughtAll, g=rg();
  var pickTotal=Object.keys(PICKS).length, pickDone=Object.keys(PICKS).filter(function(n){var r=rowNum(n),b=r&&box(r);return b&&b.checked}).length;
  var legendary=statRarity('legendary',all), mythical=statRarity('mythical',all);
  var metaLoaded=Object.keys(meta||{}).length, dexLoaded=Object.keys(dex||{}).length;
  var grid=$('statsGrid');

    statCard('Mythical',mythical.done+' / '+mythical.total,metaLoaded?'loaded rarity data':'load app data',statPct(mythical.done,mythical.total))+

  renderRegionStats();
  var typeKnown=renderTypeStats();
  var note=$('statsNote');
  if(note)note.textContent=typeKnown?('Stats ready. Primary type snapshot has '+typeKnown+' loaded Pokémon. Encounter clues still load per card.'):('Core stats are ready. Tap Load All App Data for rarity and type breakdowns.');

function badge(slug,icon,title,desc,done,total,needsData){return {slug:slug,icon:icon,title:title,desc:desc,done:done,total:total,earned:total>0&&done>=total,needsData:!!needsData};}
function achievementList(){
  var all=rows(), totalAll=all.length, caughtAll=statChecked(all), map=regionMap(), out=[];
  out.push(badge('first-catch','001','First Catch','Check off your first Pokémon.',Math.min(caughtAll,1),1,false));
  out.push(badge('hundred-club','100','Hundred Club','Collect 100 Pokémon.',Math.min(caughtAll,100),100,false));
  out.push(badge('halfway-hero','50%','Halfway Hero','Reach the halfway mark.',Math.min(caughtAll,Math.ceil(totalAll/2)),Math.ceil(totalAll/2),false));
  out.push(badge('national-completionist','★','National Completionist','Complete the full National Dex.',caughtAll,totalAll,false));
  var order=['Kanto','Johto','Hoenn','Sinnoh','Unova','Kalos','Alola','Galar','Hisui','Paldea'];
  order.forEach(function(r){if(map[r])out.push(badge(r.toLowerCase()+'-master',r.slice(0,2),r+' Master','Complete every '+r+' Pokémon.',map[r].done,map[r].total,false));});
  var pickTotal=Object.keys(PICKS).length, pickDone=Object.keys(PICKS).filter(function(n){var r=rowNum(n),b=r&&box(r);return b&&b.checked}).length;
  out.push(badge('community-curator','♥','Community Curator','Complete the community pick list.',pickDone,pickTotal,false));
  var leg=statRarity('legendary',all), myth=statRarity('mythical',all), metaLoaded=Object.keys(meta||{}).length;
  out.push(badge('legendary-hunter','L','Legendary Hunter','Collect every loaded Legendary.',leg.done,leg.total,!metaLoaded));
  out.push(badge('mythical-seeker','M','Mythical Seeker','Collect every loaded Mythical.',myth.done,myth.total,!metaLoaded));
  out.push(badge('data-scholar','DB','Data Scholar','Load app data for the full Dex.',Math.min(metaLoaded,totalAll),totalAll,false));
  return out;
}
function badgeHtml(b){var cls='ach-badge '+(b.earned?'earned':'locked');var prog=b.needsData?'Load data':(b.done+' / '+b.total);return '<div class="'+cls+'" data-ach="'+esc(b.slug)+'"><button class="ach-share" type="button" data-slug="'+esc(b.slug)+'">Share</button><div class="ach-icon">'+esc(b.earned?'✓':b.icon)+'</div><div class="ach-title">'+esc(b.title)+'</div><div class="ach-desc">'+esc(b.desc)+'</div><div class="ach-progress">'+esc(prog)+'</div></div>';}
function renderAchievements(){var list=achievementList(), earned=list.filter(function(b){return b.earned}), grid=$('achievementGrid'), sum=$('achievementSummary'), note=$('achievementNote');if(grid)grid.innerHTML=list.map(badgeHtml).join('');if(sum)sum.textContent='Unlocked '+earned.length+' of '+list.length+' badges.';if(note){var needs=list.some(function(b){return b.needsData});note.textContent=needs?'Load All App Data to calculate Legendary and Mythical badges accurately.':'Badges are live. Earned badges can be shared individually or as a summary.';}}
function shareTextFor(b){return 'I unlocked the '+b.title+' badge in my National Pokédex Checklist — '+b.done+' / '+b.total+'.';}
function shareBadgeBySlug(slug){var list=achievementList(), b=list.filter(function(x){return x.slug===slug})[0];if(!b)return;var text=shareTextFor(b);if(navigator.share){navigator.share({title:b.title+' Badge',text:text}).catch(function(){});}else if(navigator.clipboard){navigator.clipboard.writeText(text).then(function(){stat('Badge share text copied.');});}else{win.alert(text);}}
function shareEarnedBadges(){var earned=achievementList().filter(function(b){return b.earned});var text=earned.length?('I unlocked '+earned.length+' achievement badges in my National Pokédex Checklist: '+earned.map(function(b){return b.title}).join(', ')+'.'):'No achievement badges unlocked yet.';if(navigator.share){navigator.share({title:'Pokédex Achievement Badges',text:text}).catch(function(){});}else if(navigator.clipboard){navigator.clipboard.writeText(text).then(function(){stat('Earned badge summary copied.');});}else{win.alert(text);}}
`;}
function fail(msg){document.body.innerHTML='<div class="boot"><div><div class="ball"></div><h1>V0.5.2 load failed</h1><p>'+String(msg||'Unknown error')+'</p></div></div>';}
fetch(SRC+'?v='+Date.now(),{cache:'no-store'}).then(function(r){if(!r.ok)throw new Error('Could not load stable-v0.4.3');return r.text();}).then(function(html){
  html=html.replace('National Pokédex Clean Backup Build','National Pokédex Achievement Badges Build')
           .replace('Loading Pokédex Clean Build…','Loading Pokédex Achievement Badges…')
           .replace('V0.4.3: cleanup, safer reset, export/import backups.','V0.5.2: achievement badges + stats dashboard.')
           .replace('BUILD="V0.4.3-BACKUP"','BUILD="V0.5.2-ACHIEVEMENTS"')
           .replace('hook();protectReset();apply();','hook();protectReset();'+statsPatch()+'injectStats();apply();');
  if(html.indexOf('V0.5.2-ACHIEVEMENTS')===-1 || html.indexOf('achievementList')===-1) throw new Error('Patch markers were not found.');
  document.open();document.write(html);document.close();
}).catch(function(e){fail(e.message||e);});
