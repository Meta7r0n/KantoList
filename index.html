<!doctype html>
<html lang='en'>
<head>
<meta charset='utf-8'>
<meta name='viewport' content='width=device-width,initial-scale=1,viewport-fit=cover'>
<meta name='theme-color' content='#ef4444'>
<title>National Pokédex Sort Build</title>
<style>
html,body{margin:0;width:100%;height:100%;background:#0f172a;overflow:hidden}
#app{border:0;width:100%;height:100vh;display:block;background:#f7f7fb}
.load{position:fixed;inset:0;display:grid;place-items:center;color:white;font-family:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:linear-gradient(135deg,#ef4444,#2563eb,#7c3aed);z-index:10;text-align:center;padding:20px}
.ball{width:72px;height:72px;margin:0 auto 14px;border-radius:50%;background:linear-gradient(#ef4444 0 48%,#111827 49% 52%,#fff 53%);box-shadow:0 20px 50px rgba(0,0,0,.35)}
</style>
</head>
<body>
<div class='load' id='load'><div><div class='ball'></div><h1>Loading Pokédex Sort Build…</h1><p>Restoring sort controls on the deployed app.</p></div></div>
<iframe id='app' title='National Pokédex Checklist'></iframe>
<script>
(function(){
var BASE='https://raw.githubusercontent.com/Meta7r0n/KantoList/main/index.html';
var TYPES=['normal','fire','water','electric','grass','ice','fighting','poison','ground','flying','psychic','bug','rock','ghost','dragon','dark','steel','fairy'];
var LABELS={normal:'Normal',fire:'Fire',water:'Water',electric:'Electric',grass:'Grass',ice:'Ice',fighting:'Fighting',poison:'Poison',ground:'Ground',flying:'Flying',psychic:'Psychic',bug:'Bug',rock:'Rock',ghost:'Ghost',dragon:'Dragon',dark:'Dark',steel:'Steel',fairy:'Fairy'};
var COLORS=['black','blue','brown','gray','green','pink','purple','red','white','yellow'];
var STATS=['common','uncommon','legendary','mythical'];
var PICKS={'025':100,'006':98,'133':97,'150':96,'094':95,'448':94,'658':93,'143':92,'149':91,'384':90,'282':89,'059':88,'001':87,'004':86,'007':85,'151':84,'130':83,'248':82,'445':81,'197':80,'196':79,'700':78,'483':77,'484':76,'487':75,'493':74,'644':73,'643':72,'646':71,'716':70,'717':69,'718':68,'888':67,'889':66,'890':65,'1007':64,'1008':63,'1024':62,'887':61,'635':60,'373':59,'376':58,'249':57,'250':56,'245':55,'244':54,'243':53,'230':52,'260':51,'257':50,'254':49,'392':48,'389':47,'395':46,'503':45,'500':44,'497':43,'812':42,'815':41,'818':40,'908':39,'911':38,'914':37,'1000':36,'959':35,'979':34,'981':33,'983':32};
var frame=document.getElementById('app'),doc=null,win=null,meta={},orig={},started=false;
function key(){return 'nationalDexSortMeta.v0.3'}
function read(){try{return JSON.parse(localStorage.getItem(key()))||{}}catch(e){return {}}}
function write(){try{localStorage.setItem(key(),JSON.stringify(meta))}catch(e){}}
function id(x){return doc.getElementById(x)}
function all(s,root){return Array.prototype.slice.call((root||doc).querySelectorAll(s))}
function rows(){return all('.row').filter(function(r){return r.querySelector('input[type="checkbox"][data-num]')})}
function num(r){var b=r.querySelector('input[type="checkbox"][data-num]');return b?b.dataset.num:'000'}
function region(){var r=doc.querySelector('input[name="region"]:checked');return r?r.value:'All'}
function st(t){var e=id('sortStatus');if(e)e.textContent=t;var s=id('statusLine');if(s)s.textContent=t}
function pretty(t){return String(t||'').split('-').map(function(p){return p.charAt(0).toUpperCase()+p.slice(1)}).join(' ')}
function category(m){if(!m)return 'common';if(m.is_mythical)return 'mythical';if(m.is_legendary)return 'legendary';if(m.capture_rate!=null&&m.capture_rate<=45)return 'uncommon';return 'common'}
function catLabel(c){return c==='mythical'?'Mythical':c==='legendary'?'Legendary':c==='uncommon'?'Uncommon':'Common'}
function scoped(){var rg=region();return rows().filter(function(r){return rg==='All'||r.dataset.region===rg})}
function setHeaderCollapsed(on){doc.body.classList.toggle('header-collapsed',!!on);var b=id('headerCollapseBtn');if(b){b.textContent=on?'Show Menu ▼':'Collapse Menu ▲';b.setAttribute('aria-expanded',String(!on))}try{localStorage.setItem('nationalDexHeaderCollapsed.v0.3',on?'1':'0')}catch(e){}}
function setupCollapse(){var h=doc.querySelector('header .wrap')||doc.querySelector('header');if(!h||id('headerCollapseBtn'))return;h.insertAdjacentHTML('afterbegin','<div class="header-collapse-row"><button id="headerCollapseBtn" type="button" aria-expanded="true">Collapse Menu ▲</button></div>');id('headerCollapseBtn').addEventListener('click',function(){setHeaderCollapsed(!doc.body.classList.contains('header-collapsed'))});try{setHeaderCollapsed(localStorage.getItem('nationalDexHeaderCollapsed.v0.3')==='1')}catch(e){setHeaderCollapsed(false)}}
function inject(){
 var style=doc.createElement('style');
 style.textContent='.header-collapse-row{display:flex;justify-content:flex-end;margin:0 0 7px}#headerCollapseBtn{border:0;border-radius:999px;background:rgba(255,255,255,.92);color:#172554;font:inherit;font-size:.82rem;font-weight:950;padding:8px 11px;min-height:36px;box-shadow:0 6px 15px rgba(0,0,0,.16)}body.header-collapsed header{padding-bottom:8px!important}body.header-collapsed header .sub,body.header-collapsed header .dev-note,body.header-collapsed header .meter,body.header-collapsed header .tools,body.header-collapsed header .sort-tools,body.header-collapsed header .sort-status,body.header-collapsed header .tabs{display:none!important}body.header-collapsed header h1{font-size:1.05rem!important;line-height:1.1!important;margin:0!important}.sort-tools{display:grid;grid-template-columns:auto minmax(190px,1fr) auto auto;gap:8px;align-items:center;margin:0 0 10px}.sort-label{font-weight:950;color:white;font-size:.88rem;white-space:nowrap}#sortMode{border:0;border-radius:999px;padding:11px 14px;font-size:16px;outline:none;background:white;color:#111827;font-weight:800;min-height:42px;width:100%}#sortDataBtn,#resetSortBtn{display:grid;place-items:center;border:0;border-radius:999px;background:#e5e7eb;color:#111827;font-weight:900;padding:10px 13px;min-height:42px;cursor:pointer;text-align:center;text-decoration:none}#sortDataBtn{background:#a7f3d0;color:#064e3b}#sortDataBtn[disabled],#resetSortBtn[disabled]{opacity:.62;cursor:not-allowed}.sort-status{font-size:.78rem;font-weight:850;color:#fff3a4;min-height:16px;margin:-3px 0 8px}#sortedSection{display:none}body.sorted-mode main .region-section:not(#sortedSection){display:none!important}body.sorted-mode #sortedSection{display:block!important}.sort-chip{flex:0 0 auto;border-radius:999px;background:#eef2ff;color:#3730a3;font-weight:950;font-size:.72rem;padding:5px 8px;white-space:nowrap}.sort-chip.pending{background:#fef3c7;color:#92400e}.sort-chip.mythical{background:#ede9fe;color:#5b21b6}.sort-chip.legendary{background:#dbeafe;color:#1d4ed8}.sort-chip.uncommon{background:#fef3c7;color:#92400e}.sort-chip.common{background:#dcfce7;color:#166534}.sort-chip.community{background:#ffe4e6;color:#9f1239}.sort-chip.color{background:#f3f4f6;color:#374151}.sort-chip.type{background:#e0f2fe;color:#075985}@media(max-width:700px){.sort-tools{grid-template-columns:1fr}.sort-label{display:none}#sortDataBtn,#resetSortBtn{width:100%}.header-collapse-row{margin-bottom:5px}#headerCollapseBtn{font-size:.78rem;padding:7px 10px}}';
 doc.head.appendChild(style);
 setupCollapse();
 var tools=doc.querySelector('.tools');
 if(tools&&!id('sortMode'))tools.insertAdjacentHTML('afterend','<div class="sort-tools" aria-label="Sort controls"><span class="sort-label">Sort</span><select id="sortMode"><option value="dex">Pokédex Entry #</option><option value="type">Primary Type</option><option value="status">Common / Uncommon / Legendary / Mythical</option><option value="color">Primary Color</option><option value="community">Community Picks beta</option></select><button id="sortDataBtn" type="button">Load Sort Data</button><button id="resetSortBtn" type="button">Reset Order</button></div><div class="sort-status" id="sortStatus">Sort build restored. Header can now collapse.</div>');
 var form=id('dexForm');
 if(form&&!id('sortedSection'))form.insertAdjacentHTML('afterbegin','<section id="sortedSection" class="region-section" data-region="Sorted"><h2 id="sortedTitle">Sorted View <span>Sorting active</span></h2><div class="list" id="sortedList"></div></section>');
 rows().forEach(function(r){orig[num(r)]={p:r.parentNode}});
 id('sortMode').addEventListener('change',sort);
 id('sortDataBtn').addEventListener('click',load);
 id('resetSortBtn').addEventListener('click',reset);
 all('input[name="region"]').forEach(function(r){r.addEventListener('change',function(){setTimeout(function(){if(id('sortMode').value!=='dex')sort()},0)})});
 st('Sort build restored. Use Collapse Menu to free screen space.');
}
function restore(){rows().sort(function(a,b){return parseInt(num(a),10)-parseInt(num(b),10)}).forEach(function(r){var o=orig[num(r)];if(o&&o.p)o.p.appendChild(r)});if(id('sortedList'))id('sortedList').innerHTML='';doc.body.classList.remove('sorted-mode');all('.sort-chip').forEach(function(c){c.remove()})}
function chip(r,t,c){all('.sort-chip',r).forEach(function(x){x.remove()});var s=doc.createElement('span');s.className='sort-chip '+(c||'');s.textContent=t;r.appendChild(s)}
function val(r,m){var n=num(r),x=meta[n]||{};if(m==='type'){var i=TYPES.indexOf(x.primary_type||'');if(i<0)i=999;return[i,x.primary_type||'zzzz',parseInt(n,10)]}if(m==='status'){var c=category(x);return[STATS.indexOf(c),parseInt(n,10)]}if(m==='color'){var ci=COLORS.indexOf(x.color||'');if(ci<0)ci=999;return[ci,x.color||'zzzz',parseInt(n,10)]}if(m==='community')return[-(PICKS[n]||0),parseInt(n,10)];return[parseInt(n,10)]}
function cmp(m){return function(a,b){var A=val(a,m),B=val(b,m);for(var i=0;i<Math.max(A.length,B.length);i++){if(A[i]<B[i])return-1;if(A[i]>B[i])return 1}return 0}}
function decorate(r,m){var n=num(r),x=meta[n];if(m==='type')chip(r,x&&x.primary_type?LABELS[x.primary_type]:'Load type',x&&x.primary_type?'type':'pending');else if(m==='status'){var c=category(x);chip(r,catLabel(c),c)}else if(m==='color')chip(r,x&&x.color?pretty(x.color):'Load color',x&&x.color?'color':'pending');else if(m==='community'){var sc=PICKS[n]||0;chip(r,sc?'Pick '+sc:'Unscored',sc?'community':'pending')}}
function sort(){restore();var m=id('sortMode').value;if(m==='dex'){st('Sorted by Pokédex entry number.');if(win.Dex&&win.Dex.search)win.Dex.search();return}var list=id('sortedList'),rs=scoped().sort(cmp(m));rs.forEach(function(r){decorate(r,m);list.appendChild(r)});doc.body.classList.add('sorted-mode');id('sortedTitle').innerHTML='Sorted View <span>'+(region()==='All'?'All Regions':region())+' · '+id('sortMode').options[id('sortMode').selectedIndex].text+'</span>';var needs=(m==='type'||m==='color'||m==='status')&&rs.some(function(r){return !meta[num(r)]});st(needs?'Sort active with fallback order. Tap Load Sort Data for type/color/status metadata.':m==='community'?'Community Picks beta. Unscored Pokémon fall back to Pokédex order.':'Sorted with cached metadata.');if(win.Dex&&win.Dex.search)win.Dex.search()}
function load(){if(started)return;var ids=scoped().map(num).filter(function(n){return !meta[n]});if(!ids.length){st('Sort metadata already loaded for this view.');sort();return}started=true;var btn=id('sortDataBtn');btn.disabled=true;btn.textContent='Loading…';var done=0,idx=0,workers=[];st('Loading sort metadata 0 / '+ids.length+'…');function fj(u){return fetch(u).then(function(r){if(!r.ok)throw Error('HTTP '+r.status);return r.json()})}function work(){if(idx>=ids.length)return Promise.resolve();var n=ids[idx++],i=parseInt(n,10);return Promise.all([fj('https://pokeapi.co/api/v2/pokemon/'+i+'/'),fj('https://pokeapi.co/api/v2/pokemon-species/'+i+'/')]).then(function(a){var p=a[0],s=a[1];meta[n]={primary_type:p.types&&p.types[0]&&p.types[0].type?p.types[0].type.name:'',color:s.color&&s.color.name?s.color.name:'',is_legendary:!!s.is_legendary,is_mythical:!!s.is_mythical,capture_rate:s.capture_rate}}).catch(function(){meta[n]=meta[n]||{}}).then(function(){done++;if(done%10===0||done===ids.length){write();st('Loading sort metadata '+done+' / '+ids.length+'…')}return work()})}for(var w=0;w<Math.min(8,ids.length);w++)workers.push(work());Promise.all(workers).then(function(){write();started=false;btn.disabled=false;btn.textContent='Load Sort Data';st('Sort metadata loaded and cached.');sort()}).catch(function(){started=false;btn.disabled=false;btn.textContent='Retry Sort Data';st('Sort metadata load hit an error. Try again while online.')})}
function reset(){id('sortMode').value='dex';restore();st('Sorted by Pokédex entry number.');if(win.Dex&&win.Dex.search)win.Dex.search()}
frame.addEventListener('load',function(){win=frame.contentWindow;doc=frame.contentDocument;meta=read();inject();setTimeout(function(){var l=document.getElementById('load');if(l)l.style.display='none'},350)});
fetch(BASE+'?v='+Date.now()).then(function(r){if(!r.ok)throw Error('Base app load failed');return r.text()}).then(function(html){frame.srcdoc=html}).catch(function(err){document.getElementById('load').innerHTML='<div><div class="ball"></div><h1>Could not load Pokédex base</h1><p>'+err.message+'</p></div>'});
})();
</script>
</body>
</html>
