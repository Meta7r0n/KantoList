<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#ef4444">
<title>National Pokédex Filter Build</title>
<style>
html,body{margin:0;width:100%;height:100%;background:#0f172a;overflow:hidden}
#app{border:0;width:100%;height:100vh;display:block;background:#f7f7fb}
.load{position:fixed;inset:0;display:grid;place-items:center;color:white;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:linear-gradient(135deg,#ef4444,#2563eb,#7c3aed);z-index:10;text-align:center;padding:20px}
.ball{width:72px;height:72px;margin:0 auto 14px;border-radius:50%;background:linear-gradient(#ef4444 0 48%,#111827 49% 52%,#fff 53%);box-shadow:0 20px 50px rgba(0,0,0,.35)}
</style>
</head>
<body>
<div class="load" id="load"><div><div class="ball"></div><h1>Loading Pokédex Filter Build…</h1><p>V0.4.1: forcing filter controls to appear even when sort controls already exist.</p></div></div>
<iframe id="app" title="National Pokédex Checklist"></iframe>
<script>
(function(){
var BASE="https://raw.githubusercontent.com/Meta7r0n/KantoList/main/index.html";
var BUILD="V0.4.1-FILTERS";
var TYPES=["normal","fire","water","electric","grass","ice","fighting","poison","ground","flying","psychic","bug","rock","ghost","dragon","dark","steel","fairy"];
var TYPE_LABEL={normal:"Normal",fire:"Fire",water:"Water",electric:"Electric",grass:"Grass",ice:"Ice",fighting:"Fighting",poison:"Poison",ground:"Ground",flying:"Flying",psychic:"Psychic",bug:"Bug",rock:"Rock",ghost:"Ghost",dragon:"Dragon",dark:"Dark",steel:"Steel",fairy:"Fairy"};
var COLORS=["black","blue","brown","gray","green","pink","purple","red","white","yellow"];
var STATUSES=["common","uncommon","legendary","mythical"];
var PICKS={"025":100,"006":98,"133":97,"150":96,"094":95,"448":94,"658":93,"143":92,"149":91,"384":90,"282":89,"059":88,"001":87,"004":86,"007":85,"151":84,"130":83,"248":82,"445":81,"197":80,"196":79,"700":78,"483":77,"484":76,"487":75,"493":74,"644":73,"643":72,"646":71,"716":70,"717":69,"718":68,"888":67,"889":66,"890":65,"1007":64,"1008":63,"1024":62,"887":61,"635":60,"373":59,"376":58,"249":57,"250":56,"245":55,"244":54,"243":53,"230":52,"260":51,"257":50,"254":49,"392":48,"389":47,"395":46,"503":45,"500":44,"497":43,"812":42,"815":41,"818":40,"908":39,"911":38,"914":37,"1000":36,"959":35,"979":34,"981":33,"983":32};
var frame=document.getElementById("app"),doc,win,meta={},loading=false;
function storageKey(){return "nationalDexFilterMeta.v0.4"}
function filterKey(){return "nationalDexFilterMode.v0.4"}
function loadCache(){try{return JSON.parse(localStorage.getItem(storageKey()))||{}}catch(e){return {}}}
function saveCache(){try{localStorage.setItem(storageKey(),JSON.stringify(meta))}catch(e){}}
function id(x){return doc.getElementById(x)}
function all(sel,root){return Array.prototype.slice.call((root||doc).querySelectorAll(sel))}
function rows(){return all(".row").filter(function(r){return r.querySelector('input[type="checkbox"][data-num]')})}
function num(r){var b=r.querySelector('input[type="checkbox"][data-num]');return b?b.dataset.num:"000"}
function box(r){return r.querySelector('input[type="checkbox"][data-num]')}
function activeRegion(){var r=doc.querySelector('input[name="region"]:checked');return r?r.value:"All"}
function scopedRows(){var rg=activeRegion();return rows().filter(function(r){return rg==="All"||r.dataset.region===rg})}
function pretty(s){return String(s||"").split("-").map(function(p){return p.charAt(0).toUpperCase()+p.slice(1)}).join(" ")}
function category(m){if(!m)return "";if(m.is_mythical)return "mythical";if(m.is_legendary)return "legendary";if(m.capture_rate!=null&&m.capture_rate<=45)return "uncommon";return "common"}
function catLabel(c){return c==="mythical"?"Mythical":c==="legendary"?"Legendary":c==="uncommon"?"Uncommon":"Common"}
function status(msg){var f=id("filterStatus");if(f)f.textContent=msg;var s=id("statusLine");if(s)s.textContent=msg}
function getFilter(){var f=id("filterMode");return f?f.value:"all"}
function filterLabel(){var f=getFilter();if(f==="all")return "All Pokémon";if(f==="caught")return "Caught only";if(f==="missing")return "Missing only";if(f==="community")return "Community picks only";var p=f.split(":");if(p[0]==="type")return TYPE_LABEL[p[1]]+" type";if(p[0]==="color")return pretty(p[1])+" color";if(p[0]==="status")return catLabel(p[1])+" only";return "Filtered"}
function needsMeta(){var f=getFilter();return f.indexOf("type:")===0||f.indexOf("color:")===0||f.indexOf("status:")===0}
function ensureBadge(){var row=doc.querySelector(".header-collapse-row");var header=doc.querySelector("header .wrap")||doc.querySelector("header");if(row&&!id("buildBadge")){row.insertAdjacentHTML("afterbegin",'<span class="build-badge" id="buildBadge">'+BUILD+'</span>');return}if(header&&!row){header.insertAdjacentHTML("afterbegin",'<div class="header-collapse-row"><span class="build-badge" id="buildBadge">'+BUILD+'</span><button id="headerCollapseBtn" type="button" aria-expanded="true">Collapse Menu ▲</button></div>');var btn=id("headerCollapseBtn");if(btn){btn.addEventListener("click",function(){var on=!doc.body.classList.contains("header-collapsed");doc.body.classList.toggle("header-collapsed",on);btn.textContent=on?"Show Menu ▼":"Collapse Menu ▲"})}}}
function filterOptions(){var html='<option value="all">Show All Pokémon</option><option value="caught">Caught / Checked Only</option><option value="missing">Missing / Unchecked Only</option><option value="community">Community Picks Only</option><option value="status:common">Common Only</option><option value="status:uncommon">Uncommon Only</option><option value="status:legendary">Legendary Only</option><option value="status:mythical">Mythical Only</option><option disabled>──────── Types ────────</option>';TYPES.forEach(function(t){html+='<option value="type:'+t+'">'+TYPE_LABEL[t]+' Type</option>'});html+='<option disabled>──────── Colors ────────</option>';COLORS.forEach(function(c){html+='<option value="color:'+c+'">'+pretty(c)+' Color</option>'});return html}
function inject(){
 var css=doc.createElement("style");
 css.textContent='.build-badge{display:inline-flex;align-items:center;justify-content:center;border:1px solid rgba(255,255,255,.26);border-radius:999px;background:rgba(15,23,42,.35);color:#fff;font-size:.66rem;font-weight:950;letter-spacing:.035em;padding:5px 8px;line-height:1;white-space:nowrap}.filter-tools{display:grid;grid-template-columns:minmax(190px,1fr) auto auto;gap:8px;align-items:center;margin:0 0 8px}#filterMode{border:0;border-radius:999px;padding:11px 14px;font-size:16px;outline:none;background:white;color:#111827;font-weight:850;min-height:42px;width:100%}#filterDataBtn,#clearFilterBtn{display:grid;place-items:center;border:0;border-radius:999px;font:inherit;font-weight:950;padding:10px 13px;min-height:42px;cursor:pointer;text-align:center}#filterDataBtn{background:#a7f3d0;color:#064e3b}#clearFilterBtn{background:#bfdbfe;color:#172554}#filterDataBtn[disabled],#clearFilterBtn[disabled]{opacity:.62;cursor:not-allowed}.filter-status{font-size:.78rem;font-weight:900;color:#fff3a4;min-height:16px;margin:-2px 0 8px}.row.filter-hidden,.region-section.filter-hidden{display:none!important}.filter-chip{flex:0 0 auto;border-radius:999px;background:#eef2ff;color:#3730a3;font-weight:950;font-size:.72rem;padding:5px 8px;white-space:nowrap}.filter-chip.pending{background:#fef3c7;color:#92400e}.filter-chip.type{background:#e0f2fe;color:#075985}.filter-chip.color{background:#f3f4f6;color:#374151}.filter-chip.common,.filter-chip.caught{background:#dcfce7;color:#166534}.filter-chip.missing{background:#fee2e2;color:#991b1b}.filter-chip.uncommon{background:#fef3c7;color:#92400e}.filter-chip.legendary{background:#dbeafe;color:#1d4ed8}.filter-chip.mythical{background:#ede9fe;color:#5b21b6}.filter-chip.community{background:#ffe4e6;color:#9f1239}body.header-collapsed header .filter-tools,body.header-collapsed header .filter-status{display:none!important}@media(max-width:700px){.filter-tools{grid-template-columns:1fr}#filterDataBtn,#clearFilterBtn{width:100%}.build-badge{font-size:.62rem;padding:5px 7px}}';
 doc.head.appendChild(css);
 ensureBadge();
 if(!id("filterMode")){
   var anchor=id("sortStatus")||doc.querySelector(".sort-status")||doc.querySelector(".sort-tools")||doc.querySelector(".tools")||doc.querySelector("header .wrap")||doc.querySelector("header");
   var controls='<div class="filter-tools" aria-label="Filter controls"><select id="filterMode" aria-label="Filter Pokémon list">'+filterOptions()+'</select><button id="filterDataBtn" type="button">Load Filter Data</button><button id="clearFilterBtn" type="button">Clear Filter</button></div><div class="filter-status" id="filterStatus">Filters ready. Caught/missing work instantly. Type/color/rarity need Filter Data.</div>';
   if(anchor)anchor.insertAdjacentHTML("afterend",controls);
 }
 try{id("filterMode").value=localStorage.getItem(filterKey())||"all"}catch(e){}
 id("filterMode").addEventListener("change",function(){try{localStorage.setItem(filterKey(),getFilter())}catch(e){}applyFilters()});
 id("clearFilterBtn").addEventListener("click",function(){id("filterMode").value="all";try{localStorage.setItem(filterKey(),"all")}catch(e){}applyFilters()});
 id("filterDataBtn").addEventListener("click",loadMeta);
 all('input[name="region"]').forEach(function(r){r.addEventListener("change",function(){setTimeout(applyFilters,80)})});
 var search=id("search");if(search)search.addEventListener("input",function(){setTimeout(applyFilters,80)});
 rows().forEach(function(r){var b=box(r);if(b)b.addEventListener("change",function(){setTimeout(applyFilters,30)})});
 var sort=id("sortMode");if(sort)sort.addEventListener("change",function(){setTimeout(applyFilters,160)});
 var reset=id("resetSortBtn");if(reset)reset.addEventListener("click",function(){setTimeout(applyFilters,160)});
 applyFilters();
}
function addChip(r,text,cls){all(".filter-chip",r).forEach(function(c){c.remove()});if(getFilter()==="all")return;var s=doc.createElement("span");s.className="filter-chip "+(cls||"");s.textContent=text;r.appendChild(s)}
function pass(r){var f=getFilter(),n=num(r),m=meta[n],b=box(r);if(f==="all")return true;if(f==="caught")return !!(b&&b.checked);if(f==="missing")return !!(b&&!b.checked);if(f==="community")return !!PICKS[n];var p=f.split(":");if(p[0]==="type")return !!(m&&m.primary_type===p[1]);if(p[0]==="color")return !!(m&&m.color===p[1]);if(p[0]==="status")return !!(m&&category(m)===p[1]);return true}
function decorate(r){var f=getFilter(),n=num(r),m=meta[n],b=box(r);if(f==="all")return;if(f==="caught")return addChip(r,"Caught","caught");if(f==="missing")return addChip(r,"Missing","missing");if(f==="community")return addChip(r,"Pick "+PICKS[n],"community");var p=f.split(":");if(p[0]==="type")return addChip(r,m&&m.primary_type?TYPE_LABEL[m.primary_type]:"Load type",m&&m.primary_type?"type":"pending");if(p[0]==="color")return addChip(r,m&&m.color?pretty(m.color):"Load color",m&&m.color?"color":"pending");if(p[0]==="status"){var c=category(m);return addChip(r,c?catLabel(c):"Load status",c||"pending")}}
function applyFilters(){var rg=activeRegion(),total=0,shown=0,need=false;rows().forEach(function(r){all(".filter-chip",r).forEach(function(c){c.remove()});var inScope=rg==="All"||r.dataset.region===rg;if(inScope)total++;var ok=pass(r);r.classList.toggle("filter-hidden",!ok);if(inScope&&ok){shown++;decorate(r)}if(inScope&&needsMeta()&&!meta[num(r)])need=true});all(".region-section").forEach(function(sec){if(sec.id==="sortedSection")return;var any=all(".row",sec).some(function(r){return !r.classList.contains("filter-hidden")&&!r.classList.contains("search-hidden")});sec.classList.toggle("filter-hidden",!any)});var msg=filterLabel()+": "+shown+" of "+total+" in "+(rg==="All"?"All Regions":rg);if(need)msg+=" — tap Load Filter Data for complete results.";status(msg)}
function fetchJson(u){return fetch(u).then(function(r){if(!r.ok)throw Error("HTTP "+r.status);return r.json()})}
function loadMeta(){if(loading)return;var ids=scopedRows().map(num).filter(function(n){return !meta[n]});if(!ids.length){status("Filter data already loaded for this region.");applyFilters();return}loading=true;var btn=id("filterDataBtn");btn.disabled=true;btn.textContent="Loading…";var done=0,idx=0,workers=[];status("Loading filter data 0 / "+ids.length+"…");function work(){if(idx>=ids.length)return Promise.resolve();var n=ids[idx++],i=parseInt(n,10);return Promise.all([fetchJson("https://pokeapi.co/api/v2/pokemon/"+i+"/"),fetchJson("https://pokeapi.co/api/v2/pokemon-species/"+i+"/")]).then(function(a){var p=a[0],s=a[1];meta[n]={primary_type:p.types&&p.types[0]&&p.types[0].type?p.types[0].type.name:"",color:s.color&&s.color.name?s.color.name:"",is_legendary:!!s.is_legendary,is_mythical:!!s.is_mythical,capture_rate:s.capture_rate}}).catch(function(){meta[n]=meta[n]||{}}).then(function(){done++;if(done%10===0||done===ids.length){saveCache();status("Loading filter data "+done+" / "+ids.length+"…")}return work()})}
for(var w=0;w<Math.min(8,ids.length);w++)workers.push(work());Promise.all(workers).then(function(){saveCache();loading=false;btn.disabled=false;btn.textContent="Load Filter Data";applyFilters()}).catch(function(){loading=false;btn.disabled=false;btn.textContent="Retry Filter Data";status("Filter data hit an error. Try again while online.")})}
frame.addEventListener("load",function(){win=frame.contentWindow;doc=frame.contentDocument;meta=loadCache();try{inject()}catch(e){document.getElementById("load").innerHTML='<div><div class="ball"></div><h1>V0.4.1 injection failed</h1><p>'+String(e.message||e)+'</p></div>';return}setTimeout(function(){var l=document.getElementById("load");if(l)l.style.display="none"},350)});
fetch(BASE+"?v="+Date.now(),{cache:"no-store"}).then(function(r){if(!r.ok)throw Error("Base app load failed");return r.text()}).then(function(html){frame.srcdoc=html}).catch(function(err){document.getElementById("load").innerHTML='<div><div class="ball"></div><h1>Could not load Pokédex base</h1><p>'+err.message+'</p></div>'});
})();
</script>
</body>
</html>
